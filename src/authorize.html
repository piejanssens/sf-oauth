<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SuccessFactors OAuth Authorization</title>
    <style>
      body {
        background: #f2f2f2;
        font-family: 'Open Sans', sans-serif;
        font-size: 14px;
      }

      .pm-main-app-login-success {
        color: #505050;
        line-height: 24px;
        margin-top: 50px;
        display: flex;
        gap: 60px;
        justify-content: center;
        align-items: flex-start;
        max-width: 1000px;
        margin-left: auto;
        margin-right: auto;
        padding: 0 20px;
        padding-bottom: 100px;
      }

      .pm-main-app-login-success-left {
        text-align: center;
        flex: 0 0 auto;
      }

      .pm-main-app-login-success-right {
        flex: 0 0 250px;
        margin-top: 80px;
      }

      .pm-main-app-login-success-left > h1 {
        font-size: 16px;
      }

      .pm-main-app-login-success-left form {
        margin-top: 20px;
      }

      .pm-main-app-login-success-left div {
        margin-bottom: 12px;
      }

      .pm-main-app-login-success-left label {
        display: block;
        margin-bottom: 4px;
        font-weight: bold;
        font-size: 12px;
      }

      .pm-main-app-login-success-left input[type='text'] {
        width: 200px;
        padding: 6px;
        font-size: 14px;
        border: 1px solid #ddd;
        border-radius: 4px;
      }

      .pm-main-app-login-success-left .radio-group {
        margin-bottom: 12px;
      }

      .pm-main-app-login-success-left .radio-option {
        display: inline-block;
        margin-right: 20px;
      }

      .pm-main-app-login-success-left input[type='radio'] {
        margin-right: 6px;
        cursor: pointer;
      }

      .pm-main-app-login-success-left .radio-option label {
        display: inline;
        font-weight: normal;
        margin-bottom: 0;
      }

      .pm-main-app-login-success-left input[type='submit'] {
        background-color: #ff4f19;
        color: white;
        padding: 8px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
        margin-top: 10px;
      }

      .pm-main-app-login-success-left input[type='submit']:hover {
        background-color: #e64514;
      }

      .pm-main-app-login-success-left input[type='checkbox'] {
        margin-right: 6px;
        cursor: pointer;
      }

      .pm-main-app-login-success-right .recent-identifiers {
        padding: 12px;
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 4px;
        max-height: 400px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .pm-main-app-login-success-right .recent-identifiers-title {
        font-size: 11px;
        font-weight: bold;
        color: #999;
        margin-bottom: 6px;
        text-transform: uppercase;
      }

      .pm-main-app-login-success-right .recent-identifier-item {
        display: block;
        background: #f0f0f0;
        padding: 8px 10px;
        border-radius: 3px;
        font-size: 12px;
        cursor: pointer;
        border: 1px solid #ccc;
        transition: all 0.2s;
        text-align: left;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .pm-main-app-login-success-right .recent-identifier-item:hover {
        background: #ff4f19;
        color: white;
        border-color: #ff4f19;
      }

      footer {
        position: fixed;
        bottom: 0;
        width: 100%;
        text-align: center;
        padding: 12px;
        background: #fff;
        border-top: 1px solid #ddd;
        font-size: 12px;
      }

      footer a {
        color: #ff4f19;
        text-decoration: none;
      }

      footer a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="pm-main-app-login-success">
      <div class="pm-main-app-login-success-left">
        <form
          method="post"
          action="/authorize"
          autocomplete="on"
          onsubmit="return handleFormSubmit(event)"
        >
          <div>
            <label for="identifier">SuccessFactors Identifier</label>
            <input
              type="text"
              id="identifier"
              placeholder="Enter User ID or Username"
              list="recent-identifiers-list"
            />
            <datalist id="recent-identifiers-list"></datalist>
          </div>
          <div class="radio-group">
            <div class="radio-option">
              <input
                type="radio"
                id="user_id_radio"
                name="id_type"
                value="user_id"
                checked
              />
              <label for="user_id_radio">User ID</label>
            </div>
            <div class="radio-option">
              <input
                type="radio"
                id="username_radio"
                name="id_type"
                value="username"
              />
              <label for="username_radio">Username</label>
            </div>
          </div>
          <div>
            <input type="checkbox" id="learning_only" name="learning_only" />
            <label
              for="learning_only"
              style="display: inline; font-weight: normal; margin-bottom: 0"
            >
              Learning Only User
            </label>
          </div>
          <input id="user_id" type="hidden" name="user_id" />
          <input id="username" type="hidden" name="username" />
          <input id="client_id" type="hidden" name="client_id" />
          <input id="state" type="hidden" name="state" />
          <input id="scope" type="hidden" name="scope" />
          <input id="redirect_uri" type="hidden" name="redirect_uri" />
          <input type="submit" value="Continue" />
        </form>
      </div>
      <div class="pm-main-app-login-success-right">
        <div id="recent-identifiers-container" style="display: none">
          <div class="recent-identifiers-title">Pick a Recent Identifier</div>
          <div id="recent-identifiers" class="recent-identifiers"></div>
        </div>
      </div>
    </div>
    <script>
      const STORAGE_KEY = 'sf_oauth_recent_identifiers'
      const MAX_RECENT = 20

      const queryString = window.location.search
      const urlParams = new URLSearchParams(queryString)
      document.getElementById('client_id').value = urlParams.get('client_id')
      document.getElementById('state').value = urlParams.get('state')
      document.getElementById('scope').value = urlParams.get('scope')
      document.getElementById('redirect_uri').value =
        urlParams.get('redirect_uri')

      // Load and display recent identifiers
      function loadRecentIdentifiers() {
        const stored = localStorage.getItem(STORAGE_KEY)
        const recent = stored ? JSON.parse(stored) : []

        // Update datalist for autocomplete
        const datalist = document.getElementById('recent-identifiers-list')
        datalist.innerHTML = ''
        recent.forEach((identifier) => {
          const option = document.createElement('option')
          option.value = identifier
          datalist.appendChild(option)
        })

        // Update recent identifiers display
        const container = document.getElementById(
          'recent-identifiers-container',
        )
        const display = document.getElementById('recent-identifiers')

        if (recent.length > 0) {
          container.style.display = 'block'
          display.innerHTML = ''
          recent.forEach((identifier) => {
            const item = document.createElement('div')
            item.className = 'recent-identifier-item'
            item.textContent = identifier
            item.onclick = () => {
              document.getElementById('identifier').value = identifier
              document.getElementById('identifier').focus()
            }
            display.appendChild(item)
          })
        } else {
          container.style.display = 'none'
        }
      }

      // Save identifier to recent list
      function saveRecentIdentifier(identifier) {
        if (!identifier || identifier.trim() === '') return

        const stored = localStorage.getItem(STORAGE_KEY)
        let recent = stored ? JSON.parse(stored) : []

        // Remove duplicate if exists
        recent = recent.filter((item) => item !== identifier)

        // Add to beginning
        recent.unshift(identifier)

        // Keep only MAX_RECENT items
        recent = recent.slice(0, MAX_RECENT)

        localStorage.setItem(STORAGE_KEY, JSON.stringify(recent))
        loadRecentIdentifiers()
      }

      function handleFormSubmit(event) {
        const identifier = document.getElementById('identifier').value.trim()
        const idType = document.querySelector(
          'input[name="id_type"]:checked',
        ).value

        if (!identifier) {
          alert('Please provide an identifier')
          event.preventDefault()
          return false
        }

        // Save to recent identifiers before submitting
        saveRecentIdentifier(identifier)

        // Set the appropriate hidden field based on the selected type
        if (idType === 'user_id') {
          document.getElementById('user_id').value = identifier
          document.getElementById('username').value = ''
        } else {
          document.getElementById('username').value = identifier
          document.getElementById('user_id').value = ''
        }

        return true
      }

      // Load recent identifiers on page load
      window.addEventListener('DOMContentLoaded', loadRecentIdentifiers)
    </script>
    <footer>
      <p>
        Powered by
        <a
          href="https://npmjs.com/package/sf-oauth"
          target="_blank"
          rel="noopener noreferrer"
          >sf-oauth</a
        >
        - Pieter Janssens
      </p>
      <p>
        SuccessFactors User? Check out
        <a
          href="https://chromewebstore.google.com/detail/successfactors-toolbox/kfikhefhndimbpgkcdnjellknijdodch"
          target="_blank"
          rel="noopener noreferrer"
          >SuccessFactors Toolbox</a
        >
      </p>
    </footer>
  </body>
</html>
